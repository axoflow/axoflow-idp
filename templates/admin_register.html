<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Register User - Admin</title>
    {{template "layout-head" .}}
    <style>
        .layout-left {
            width: 200px;
            min-width: 200px;
            flex-shrink: 0;
            max-width: none;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .nav {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 12px;
        }

        .nav a {
            color: #010a22;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="layout">
    {{template "layout-logo-minimal" .}}

    <div class="layout-right">
        <form class="register-container" action="/admin/register" method="post">
            <div class="nav">
                <a href="/admin">← Back to Admin Panel</a>
            </div>

            <h1>Register User</h1>

            <div class="nav">
                Admin: {{ .Username }}
            </div>

            <label class="label">
                Username
                <div class="input">
                    <input type="text" name="username" placeholder="Enter username" required />
                </div>
            </label>

            <label class="label">
                Email
                <div class="input">
                    <input type="email" name="email" placeholder="Enter email" required />
                </div>
            </label>

            <label class="label">
                Password
                <div class="input">
                    <input type="password" name="password" placeholder="Enter password" required />
                </div>
            </label>

            <label class="label">
                Groups
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="groups" value="user" checked />
                        user
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="groups" value="admins" />
                        admin
                    </label>
                </div>
            </label>

            <button type="submit">Register User</button>

            {{ if .Message }}
            <div class="error">{{ .Message }}</div>
            {{ end }}
        </form>
    </div>
</div>
</body>
</html>
