<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <title>Set Password</title>
    {{template "layout-head" .}}
</head>
<body>
<div class="layout">
    {{template "layout-logo" .}}

    <div class="layout-right">
        {{ if .Invalid }}
        <div class="login-container">
            <h1>Link Invalid</h1>
            <div class="error">This password-reset link is invalid or has expired. Please ask an administrator for a new one.</div>
            <a class="button" href="/login">Back to Login</a>
        </div>
        {{ else }}
        <form class="login-container" id="form" action="/set-password" method="post">
            <h1>Set a New Password</h1>

            <input type="hidden" name="token" value="{{ .Token }}" />

            <label class="label">
                New Password
                <div class="input">
                    <input type="password" name="new_password" autocomplete="new-password" />
                </div>
            </label>

            {{ if .Message }}
            <div class="error" id="error">{{ .Message }}</div>
            {{ end }}

            <button type="submit">Set Password</button>
        </form>
        {{ end }}
    </div>
</div>
</body>
</html>
